events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Large uploads for file storage (WebDAV / Nextcloud-style)
    client_max_body_size 512M;

    server {
        listen 80;
        server_name localhost;

        root /var/www/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # WebDAV endpoint — forward all methods to PHP-FPM
        location /dav {
            # Pass ALL WebDAV methods through to PHP
            dav_methods off;

            # Rewrite to the Laravel front controller
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # Increase timeouts for large WebDAV transfers
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;

            # Pass the original request method so SabreDAV sees PROPFIND, MKCOL, etc.
            fastcgi_param REQUEST_METHOD $request_method;
        }

        # Deny access to .ht* files
        location ~ /\.ht {
            deny all;
        }
    }
}
