# coturn/turnserver.conf

# ------------------------------------------------
# Network
# ------------------------------------------------
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Local Docker usage on host network
external-ip=127.0.0.1

# ------------------------------------------------
# Authentication
# Must match TURN_SECRET in your Laravel .env
# ------------------------------------------------
use-auth-secret
static-auth-secret=a9f00b57d34da0f02220a35b688cfc8b4452f963f86e1d2a259bb09595c301a6

# ------------------------------------------------
# Identity
# ------------------------------------------------
realm=localhost
server-name=coturn.local

# ------------------------------------------------
# TLS (comment out if not using TLS yet)
# ------------------------------------------------
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ------------------------------------------------
# Admin interface (Laravel talks to this)
# ------------------------------------------------
web-admin
web-admin-ip=127.0.0.1
web-admin-port=8080

cli-ip=127.0.0.1
cli-port=5766
cli-password=668897cdd13c19f9d1e225a116ef529e691317ebc4c1e91d

# ------------------------------------------------
# Relay port range
# ------------------------------------------------
min-port=49152
max-port=65535

# ------------------------------------------------
# Security
# ------------------------------------------------
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# ------------------------------------------------
# Logging
# ------------------------------------------------
log-file=stdout
verbose
